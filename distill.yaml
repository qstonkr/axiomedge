# Distill Plugin — 검색 그룹별 엣지 모델 빌드 프로필
# 대시보드 '빌드 설정' 탭에서도 관리 가능 (DB 저장)
# 이 파일은 초기 시드 데이터로 사용

defaults:
  teacher_model: exaone-sagemaker
  quantize: q4_k_m
  min_training_samples: 5000
  eval_threshold:
    faithfulness: 0.55
    relevancy: 0.65
  training_backend: local
  build_timeout_sec: 7200

profiles:
  pbu-store:
    enabled: true
    description: "편의점 PBU 엣지 모델"
    search_group: PBU
    base_model: "Qwen/Qwen2.5-0.5B-Instruct"
    lora:
      r: 8
      alpha: 16
      dropout: 0.05
      target_modules:
        - q_proj
        - v_proj
        - k_proj
        - o_proj
    training:
      epochs: 3
      batch_size: 4
      gradient_accumulation: 8
      learning_rate: 0.0002
      max_seq_length: 512
    qa_style:
      mode: concise
      max_answer_tokens: 256
      answer_only_ratio: 0.8
      mix_ratio:
        memorize: 0.6
        rag_reference: 0.4
    data_quality:
      self_consistency_samples: 3
      self_consistency_threshold: 0.75
      enable_self_consistency: true
      augmentation_count: 3
    deploy:
      s3_bucket: gs-knowledge-models
      s3_prefix: pbu-store/
      auto_update_cron: "0 3 * * 1"
      quantize: q4_k_m

