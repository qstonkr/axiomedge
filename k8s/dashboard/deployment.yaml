apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-dashboard
  namespace: knowledge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-dashboard
  template:
    metadata:
      labels:
        app: knowledge-dashboard
    spec:
      containers:
        - name: dashboard
          image: knowledge-local:latest
          command: ["uv", "run", "streamlit", "run", "dashboard/app.py",
                    "--server.port", "8501", "--server.address", "0.0.0.0"]
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: DASHBOARD_API_URL
              value: "http://knowledge-api.knowledge.svc:8000"
            - name: NEO4J_URI
              value: "bolt://neo4j.knowledge.svc:7687"
            - name: NEO4J_AUTH
              value: "none"
            - name: QDRANT_URL
              value: "http://qdrant.knowledge.svc:6333"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-dashboard
  namespace: knowledge
spec:
  type: NodePort
  selector:
    app: knowledge-dashboard
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30501
      name: http
