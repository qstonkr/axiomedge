apiVersion: apps/v1
kind: Deployment
metadata:
  name: bge-m3
  namespace: knowledge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bge-m3
  template:
    metadata:
      labels:
        app: bge-m3
    spec:
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
          args:
            - --model-id
            - BAAI/bge-m3
            - --port
            - "8080"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              value: ""
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bge-m3
  namespace: knowledge
spec:
  selector:
    app: bge-m3
  ports:
    - port: 80
      targetPort: 8080
      name: http
