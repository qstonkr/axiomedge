services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant/config.yaml:/qdrant/config/production.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - ./config/neo4j/neo4j.conf:/conf/neo4j.conf
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Ollama: 로컬에서는 호스트에서 직접 실행 (Apple Silicon Metal GPU 활용)
  # 클라우드 배포 시에는 별도 GPU 노드에 배포
  # brew install ollama && ollama serve
  # ollama pull exaone3.5:7.8b && ollama pull bge-m3:latest
  ollama:
    image: ollama/ollama:0.6.2
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_KEEP_ALIVE=10m
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - gpu  # docker compose --profile gpu up 으로만 실행. 기본은 호스트 ollama 사용

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bge-m3:
    # NOTE: x86_64 only - uses Rosetta emulation on Apple Silicon (slower)
    # For Mac, Ollama embedding is faster. TEI is optimal on Linux amd64.
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9.3
    platform: linux/amd64
    ports:
      - "8080:80"
    volumes:
      - bge_model:/data
    command: --model-id BAAI/bge-m3 --port 80
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  paddleocr:
    build:
      context: ./deploy/docker/paddleocr
      dockerfile: Dockerfile
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8866:8866"
    environment:
      - LANG=C.UTF-8
      - FLAGS_use_mkldnn=0
      - FLAGS_use_onednn=0
      - MKLDNN_VERBOSE=0
      - PADDLE_MKLDNN_CAPACITY=0
      - FLAGS_enable_pir_api=0
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8866/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp
    ports:
      - "5010:5010"
    environment:
      - KH_API_BASE=http://host.docker.internal:8000
      - KH_API_KEY=${KH_API_KEY:-}
      - KH_API_TIMEOUT=60
    depends_on:
      - postgres
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5010/sse || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - mcp

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  ollama_models:
  bge_model:
  redis_data:
