apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ include "knowledge-local.namespace" . }}
  labels:
    {{- include "knowledge-local.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  DATABASE_URL: {{ include "knowledge-local.databaseUrl" . | quote }}
