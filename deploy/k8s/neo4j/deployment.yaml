apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: knowledge
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.27-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: "none"
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            # Memory tuning — docker-compose 의 deploy/config/neo4j/neo4j.conf
            # 와 동일한 프로파일을 env 로 주입 (K8s 는 conf 마운트 대신 env 사용).
            # heap 1g + pagecache 512m ≈ 1.5GB 사용 → limits 2Gi 내 안전.
            # 1M+ 노드 예상 시 limits 를 8Gi 로 bump + heap 4g / pagecache 4g
            # 로 확장 필요 (별도 infra PR).
            - name: NEO4J_server_memory_heap_initial__size
              value: "1g"
            - name: NEO4J_server_memory_heap_max__size
              value: "1g"
            - name: NEO4J_server_memory_pagecache_size
              value: "512m"
            - name: NEO4J_dbms_memory_transaction_total_max
              value: "500m"
            # db.tx_timeout — LegalGraphExtractor 의 큰 UNWIND batch 가 기본
            # 60s 내에 끝나지 못하는 경우 대비 (driver retry_time_s 와 다른 개념).
            - name: NEO4J_db_tx__timeout
              value: "120s"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              # 2Gi 한도 내에서 heap 1g + pagecache 512m + JVM/OS overhead ~400m.
              # 1M+ 노드 스케일 시 이 limits 를 우선 bump 한 뒤 env 도 같이 조정.
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: local-path
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: knowledge
spec:
  selector:
    app: neo4j
  ports:
    - port: 7474
      targetPort: 7474
      name: http
    - port: 7687
      targetPort: 7687
      name: bolt
