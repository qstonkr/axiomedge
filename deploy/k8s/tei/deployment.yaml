apiVersion: apps/v1
kind: Deployment
metadata:
  name: bge-m3
  namespace: knowledge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bge-m3
  template:
    metadata:
      labels:
        app: bge-m3
    spec:
      serviceAccountName: bge-m3-sa
      initContainers:
        - name: model-download
          image: amazon/aws-cli:2.22.35
          command:
            - sh
            - -c
            - |
              aws s3 sync s3://<your-s3-bucket>/models/bge-m3/hub /data \
                --region ap-northeast-2
          volumeMounts:
            - name: model-data
              mountPath: /data
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9.3
          args:
            - --model-id
            - BAAI/bge-m3
            - --port
            - "8080"
            - --max-batch-tokens
            - "16384"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              value: ""
          volumeMounts:
            - name: model-data
              mountPath: /data
          resources:
            requests:
              memory: "8Gi"
              cpu: "2000m"
            limits:
              memory: "10Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: model-data
          persistentVolumeClaim:
            claimName: bge-m3-model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: bge-m3
  namespace: knowledge
spec:
  selector:
    app: bge-m3
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bge-m3-sa
  namespace: knowledge
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::863518448167:role/bge-m3-s3-read-role
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bge-m3-model-pvc
  namespace: knowledge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
