apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: knowledge
spec:
  serviceName: ollama
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.6.2
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "12Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 15
      # Init container: pull LLM model on first boot (name from llm-config ConfigMap)
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.6.2
          env:
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: llm-config
                  key: OLLAMA_MODEL
          command:
            - sh
            - -c
            - |
              /bin/ollama serve &
              sleep 5
              ollama pull "$OLLAMA_MODEL"
              kill %1
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "4Gi"
            limits:
              memory: "8Gi"
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        storageClassName: local-path
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: knowledge
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: http
