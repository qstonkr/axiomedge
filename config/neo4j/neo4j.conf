# Memory
# Sized for legalize-kr ingestion: large statutes (시행규칙 with many cross-refs)
# blow past the 716MB default transaction limit and stall the LegalGraphExtractor
# save under a single transaction. 2g transaction headroom + 2g heap absorbs
# those bursts and keeps the bolt connection alive instead of timing out.
server.memory.heap.initial_size=1g
server.memory.heap.max_size=2g
server.memory.pagecache.size=1g
dbms.memory.transaction.total.max=2g

# Transaction timeout
db.tx_timeout=60s

# APOC
dbms.security.procedures.unrestricted=apoc.*
dbms.security.procedures.allowlist=apoc.*

# Disable strict validation to tolerate minor config differences
server.config.strict_validation.enabled=false
