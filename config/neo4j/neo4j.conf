# Memory
# Sized for legalize-kr ingestion on a 16GB dev machine. Big statutes (시행규칙
# with many cross-references) exceed the 716MB default transaction ceiling and
# stall the LegalGraphExtractor save. Transaction memory comes from heap
# (db.tx_state.memory_allocation=ON_HEAP), so heap must be larger than the
# transaction budget to leave room for query working set.
#   heap_max 3g  > transaction.total.max 1.5g + ~1g working set
#   pagecache 1g for graph traversal
#   total Neo4j ≈ 4-5GB peak, leaving ~11GB for OS + other containers + host
server.memory.heap.initial_size=1g
server.memory.heap.max_size=3g
server.memory.pagecache.size=1g
dbms.memory.transaction.total.max=1500m

# Transaction timeout
db.tx_timeout=60s

# APOC
dbms.security.procedures.unrestricted=apoc.*
dbms.security.procedures.allowlist=apoc.*

# Disable strict validation to tolerate minor config differences
server.config.strict_validation.enabled=false
