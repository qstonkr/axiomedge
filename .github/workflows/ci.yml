name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uvx ruff check src/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true  # informational while baseline reduces (~767 errors → 0)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pyright src/

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      # transformers CVE-2026-1839: fix는 5.0.0rc3 (major+pre-release) — 별도 평가 필요
      # diskcache CVE-2025-69872, py PYSEC-2022-42969: fix version 없음
      - run: uv run pip-audit --ignore-vuln CVE-2026-1839 --ignore-vuln CVE-2025-69872 --ignore-vuln PYSEC-2022-42969

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
          POSTGRES_DB: knowledge_db
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/ -v --no-cov --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
          POSTGRES_DB: knowledge_db
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports: ['6333:6333']
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3'"
          --health-interval 10s --health-timeout 5s --health-retries 10
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: none
          NEO4J_PLUGINS: '["apoc"]'
        ports: ['7474:7474', '7687:7687']
        options: --health-cmd "wget -qO- http://localhost:7474 || exit 1" --health-interval 15s --health-timeout 10s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --no-cov --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_AUTH: none
      - name: Run e2e tests (best-effort — some need LLM)
        continue-on-error: true  # E2E may require LLM service not available in CI
        run: uv run pytest tests/e2e/ -v --no-cov --tb=short -m e2e
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_AUTH: none

  sonarqube:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ --ignore=tests/unit/test_jobs.py \
            --cov=src --cov=cli --cov-report=xml:coverage.xml -q --tb=no
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
      - name: Fix coverage paths
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          sources = root.find('sources')
          if sources is not None:
              for s in list(sources):
                  sources.remove(s)
              ET.SubElement(sources, 'source').text = '.'
          for pkg in root.iter('package'):
              pkg_name = pkg.get('name', '')
              for cls in pkg.iter('class'):
                  fn = cls.get('filename', '')
                  if not fn.startswith(('src/', 'cli/')):
                      prefix = 'cli/' if pkg_name.startswith('cli') else 'src/'
                      cls.set('filename', prefix + fn)
          tree.write('coverage.xml', xml_declaration=True)
          "
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          tags: knowledge-local:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
