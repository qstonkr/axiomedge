name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uvx ruff check src/ scripts/ cli/ dashboard/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
          POSTGRES_DB: knowledge_db
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/ -v --no-cov --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379

  sonarqube:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ --ignore=tests/unit/test_jobs.py \
            --cov=src --cov=cli --cov-report=xml:coverage.xml -q --tb=no
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
      - name: Fix coverage paths
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          sources = root.find('sources')
          if sources is not None:
              for s in list(sources):
                  sources.remove(s)
              ET.SubElement(sources, 'source').text = '.'
          for pkg in root.iter('package'):
              pkg_name = pkg.get('name', '')
              for cls in pkg.iter('class'):
                  fn = cls.get('filename', '')
                  if not fn.startswith(('src/', 'cli/')):
                      prefix = 'cli/' if pkg_name.startswith('cli') else 'src/'
                      cls.set('filename', prefix + fn)
          tree.write('coverage.xml', xml_declaration=True)
          "
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          tags: knowledge-local:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
