name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uvx ruff check src/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true  # informational while baseline reduces (~767 errors → 0)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pyright src/

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      # transformers CVE-2026-1839: fix는 5.0.0rc3 (major+pre-release) — 별도 평가 필요
      # diskcache CVE-2025-69872, py PYSEC-2022-42969: fix version 없음
      # pip CVE-2026-3219: 현재 (2026-05) 시점 upstream fix 없음 — pip 자체 취약점이라
      # 런타임 영향 제한적이므로 추적만.
      - run: uv run pip-audit --ignore-vuln CVE-2026-1839 --ignore-vuln CVE-2025-69872 --ignore-vuln PYSEC-2022-42969 --ignore-vuln CVE-2026-3219

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
          POSTGRES_DB: knowledge_db
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # coverage-gate 가 origin/main 과 diff 필요
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ --ignore=tests/unit/test_jobs.py \
            --cov=src --cov=cli \
            --cov-report=xml:coverage.xml --cov-report=json:coverage.json \
            -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage.json
          retention-days: 7

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
          POSTGRES_DB: knowledge_db
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports: ['6333:6333']
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3'"
          --health-interval 10s --health-timeout 5s --health-retries 10
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: none
          NEO4J_PLUGINS: '["apoc"]'
        ports: ['7474:7474', '7687:7687']
        options: --health-cmd "wget -qO- http://localhost:7474 || exit 1" --health-interval 15s --health-timeout 10s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Apply Alembic migrations to test DB
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
      - name: Start API server (background) for integration tests
        run: |
          mkdir -p /tmp/test-api
          nohup uv run uvicorn src.api.app:app --host 0.0.0.0 --port 8000 \
            > /tmp/test-api/api.log 2>&1 &
          echo $! > /tmp/test-api/api.pid
          # Wait for /api/v1/health to respond (server takes ~15-30s with model loads).
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8000/api/v1/health \
                || curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/api/v1/health \
                  | grep -qE '^(200|401)$'; then
              echo "API ready after ${i}*2s"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start. Last 100 log lines:"
          tail -100 /tmp/test-api/api.log
          exit 1
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_AUTH: none
          PYTHONUNBUFFERED: "1"
          AUTH_ENABLED: "false"
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --no-cov --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_AUTH: none
          TEST_API_URL: http://localhost:8000
      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/test-api/api.pid ]; then
            kill $(cat /tmp/test-api/api.pid) 2>/dev/null || true
          fi
      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-api-log
          path: /tmp/test-api/api.log
          retention-days: 7
      - name: Run e2e tests (best-effort — some need LLM)
        continue-on-error: true  # E2E may require LLM service not available in CI
        run: uv run pytest tests/e2e/ -v --no-cov --tb=short -m e2e
        env:
          DATABASE_URL: postgresql+asyncpg://knowledge:knowledge@localhost:5432/knowledge_db
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_AUTH: none

  coverage-gate:
    # PR6 — touched-file coverage gate. test job 에서 coverage.json 다운로드 후
    # gate 만 검사 (pytest 재실행 없음).
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Touched-file coverage gate (PR6)
        run: make test-coverage-gate

  sonarqube:
    runs-on: ubuntu-latest
    needs: test
    # SONAR_TOKEN/SONAR_HOST_URL secrets 가 등록된 경우에만 실행. 미등록 환경에서
    # 무의미하게 fail 표시 나는 것 방지.
    if: github.event_name == 'pull_request' && vars.SONARQUBE_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Fix coverage paths
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          sources = root.find('sources')
          if sources is not None:
              for s in list(sources):
                  sources.remove(s)
              ET.SubElement(sources, 'source').text = '.'
          for pkg in root.iter('package'):
              pkg_name = pkg.get('name', '')
              for cls in pkg.iter('class'):
                  fn = cls.get('filename', '')
                  if not fn.startswith(('src/', 'cli/')):
                      prefix = 'cli/' if pkg_name.startswith('cli') else 'src/'
                      cls.set('filename', prefix + fn)
          tree.write('coverage.xml', xml_declaration=True)
          "
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          tags: knowledge-local:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
