name: Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      # A3 — Use dry-run first to surface manifest errors before any apply.
      - name: Validate manifests (server-side dry-run)
        run: |
          kubectl apply -k deploy/k8s/ --dry-run=server

      - name: Deploy to K8s (${{ inputs.environment }})
        run: |
          kubectl apply -k deploy/k8s/

      - name: Verify rollout
        run: |
          kubectl -n knowledge rollout status deployment/knowledge-api --timeout=300s
