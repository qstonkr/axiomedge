sonar.projectKey=knowledge-local
sonar.projectName=Knowledge Local
sonar.projectVersion=0.2.0

sonar.sources=src,cli
sonar.tests=tests
sonar.language=py
sonar.python.version=3.12

sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000

# Exclusions
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/migrations/**,**/.venv/**,**/models/bge-m3/**,**/wheels/**
sonar.test.exclusions=**/test_*.py

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
